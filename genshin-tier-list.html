const maxD=Math.max(...CHARACTERS.map(c=>c.d));
let aEl='all',aRole='all',aRar='all',q='',srt='tier';
let sel=[];

function getF(){
  let d=[...CHARACTERS];
  if(aEl!=='all')d=d.filter(c=>c.el===aEl);
  if(aRole!=='all')d=d.filter(c=>c.roles.includes(aRole));
  if(aRar!=='all')d=d.filter(c=>c.r===parseInt(aRar));
  if(q)d=d.filter(c=>c.n.toLowerCase().includes(q.toLowerCase()));
  d.sort((a,b)=>srt==='tier'?TO[a.t]-TO[b.t]||b.d-a.d:srt==='dd'?b.d-a.d:srt==='da'?a.d-b.d:a.n.localeCompare(b.n));
  return d;
}
function elC(e){return{Pyro:'tp',Hydro:'th',Electro:'te',Cryo:'tc',Anemo:'ta',Geo:'tg',Dendro:'td'}[e]||''}
function tC(t){return{SS:'tss',S:'ts',A:'ta2',B:'tb2',C:'tc2'}[t]||'tc2'}
function rC(r){return r==='DPS'?'rd':r==='SubDPS'?'rs':'rsu'}

let _fd=[];
function render(){
  const data=getF();
  _fd=data;
  document.getElementById('cnt').textContent=data.length;
  const g=document.getElementById('grid');
  if(!data.length){g.innerHTML='<div class="nores"><span class="icon">🔍</span>ไม่พบตัวละคร</div>';return}
  g.innerHTML=data.map((c,i)=>{
    const pct=Math.round((c.d/maxD)*100);
    const col=EC[c.el];
    const isSel=sel.some(x=>x.n===c.n);
    return `<div class="card${isSel?' sel':''}" data-idx="${i}" onclick="togIdx(this.dataset.idx)" style="animation-delay:${Math.min(i*.022,.5)}s">
      <div class="ctop">
        <div class="cico" style="background:${col}20;box-shadow:inset 0 0 0 1px ${col}30"><span style="filter:drop-shadow(0 0 3px ${col})">${c.e}</span></div>
        <div><div class="cname">${c.n}</div><div class="cmeta"><span class="rar ${c.r===5?'r5':'r4'}">${'★'.repeat(c.r)}</span><span class="etag ${elC(c.el)}">${c.el}</span></div></div>
      </div>
      <div class="cbody">
        <span class="tbadge ${tC(c.t)}">${c.t} Tier</span>
        <div class="roles">${c.roles.map(r=>`<span class="rt ${rC(r)}">${r}</span>`).join('')}</div>
        <div class="dlabel"><span>DMG Score</span><span class="dval">${c.d}</span></div>
        <div class="btrack"><div class="bfill" style="width:${pct}%;background:linear-gradient(90deg,${col}88,${col})"></div></div>
      </div></div>`;
  }).join('');
}

function togIdx(idx){
  const c=_fd[parseInt(idx)];
  if(!c)return;
  const i=sel.findIndex(x=>x.n===c.n);
  if(i>-1)sel.splice(i,1);
  else{if(sel.length>=4){alert('เลือกได้สูงสุด 4 ตัวละคร!');return}sel.push(c)}
  updBar();render();
}
function updBar(){
  document.getElementById('cmpCnt').textContent=sel.length;
  const bar=document.getElementById('cbar');
  if(!sel.length){bar.classList.remove('active');return}
  bar.classList.add('active');
  document.getElementById('cslots').innerHTML=sel.map((c,si)=>`<div class="cslot"><div class="dot" style="background:${EC[c.el]}"></div>${c.e} ${c.n}<span class="rm" onclick="rmIdx(${si});event.stopPropagation()">×</span></div>`).join('');
}
function rmIdx(i){sel.splice(i,1);updBar();render()}
document.getElementById('btnClr').onclick=()=>{sel=[];updBar();render()};
document.getElementById('btnCmp').onclick=openM;
document.getElementById('mclose').onclick=()=>document.getElementById('mo').classList.remove('active');
document.getElementById('mo').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('active')};

function openM(){
  if(sel.length<2){alert('กรุณาเลือกอย่างน้อย 2 ตัวละคร');return}
  document.getElementById('mbody').innerHTML=`
    <div class="cgrid">${sel.map(c=>`<div class="ccard"><div class="cico2">${c.e}</div><div class="cname2">${c.n}</div><div class="ctier" style="color:${EC[c.el]}">${c.el} · ${c.r}★</div><div class="crow"><span class="l">Tier</span><span class="v">${c.t}</span></div><div class="crow"><span class="l">DMG Score</span><span class="v">${c.d}</span></div><div class="crow"><span class="l">Role</span><span class="v">${c.roles.join(', ')}</span></div><div class="crow"><span class="l">Weapon</span><span class="v">${c.w}</span></div><div class="crow"><span class="l">Nation</span><span class="v">${c.nat}</span></div></div>`).join('')}</div>
    <div class="cchart"><div class="chtitle">📊 Avg Damage Score</div><div class="chbars">${sel.map((c,i)=>`<div class="chrow"><div class="chname">${c.n.length>13?c.n.substring(0,12)+'…':c.n}</div><div class="chwrap"><div class="chbar" id="cb${i}" style="width:0%;background:linear-gradient(90deg,${EC[c.el]}99,${EC[c.el]})">${c.d}</div></div></div>`).join('')}</div><div style="margin-top:12px;font-size:10px;color:var(--text2);text-align:center;font-family:'Cinzel',serif;letter-spacing:1px">* DMG Score = ค่าประมาณการ Damage Contribution ใน v6.4 Meta</div></div>`;
  document.getElementById('mo').classList.add('active');
  setTimeout(()=>sel.forEach((c,i)=>{const e=document.getElementById('cb'+i);if(e)e.style.width=Math.round((c.d/maxD)*100)+'%'}),120);
}
document.getElementById('si').oninput=e=>{q=e.target.value;render()};
document.getElementById('ef').onclick=e=>{const b=e.target.closest('.fb');if(!b)return;document.querySelectorAll('#ef .fb').forEach(x=>x.classList.remove('active'));b.classList.add('active');aEl=b.dataset.el;render()};
document.getElementById('rf').onclick=e=>{const b=e.target.closest('.fb');if(!b)return;document.querySelectorAll('#rf .fb').forEach(x=>x.classList.remove('active'));b.classList.add('active');aRole=b.dataset.role;render()};
document.getElementById('raf').onclick=e=>{const b=e.target.closest('.fb');if(!b)return;document.querySelectorAll('#raf .fb').forEach(x=>x.classList.remove('active'));b.classList.add('active');aRar=b.dataset.rar;render()};
document.getElementById('srt').onchange=e=>{srt=e.target.value;render()};
render();
</script>
